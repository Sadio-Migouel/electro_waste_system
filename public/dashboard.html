<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | E-Waste Management</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <main class="dashboard-shell">
        <section class="dashboard-card">
            <span class="eyebrow">Role Router</span>
            <h1>Routing to your dashboard</h1>
            <p class="text-secondary mb-0">Your session is being checked. If you stay here, there may be a network or auth issue.</p>
            <div class="meta-list mt-4">
                <div class="meta-item">
                    <strong>Status</strong>
                    <span id="routingMessage">Routing...</span>
                </div>
            </div>
        </section>
    </main>

    <script src="./assets/js/api.js"></script>
    <script src="./assets/js/guard.js"></script>
    <script>
        const routingMessage = document.getElementById("routingMessage");

        function redirectByRole(role) {
            const routes = {
                user: "./user.html",
                collector: "./collector.html",
                admin: "./admin.html"
            };

            const target = routes[role] || "./login.html";
            window.location.href = target;
        }

        async function routeDashboard() {
            try {
                const user = await getCurrentUser();
                routingMessage.textContent = `Authenticated as ${user.role}. Redirecting...`;
                redirectByRole(user.role);
            } catch (error) {
                if (error.status === 401) {
                    window.location.href = "./login.html";
                    return;
                }

                routingMessage.textContent = error.message || "Unable to route right now.";
            }
        }

        routeDashboard();
    </script>
</body>
</html>
