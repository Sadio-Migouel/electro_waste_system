<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | E-Waste Management</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <main class="auth-shell">
        <section class="auth-card">
            <span class="eyebrow">Login</span>
            <h1>Access your dashboard</h1>
            <p class="text-secondary mb-4">Your session is managed by PHP. The frontend sends requests with credentials included.</p>

            <div id="alertBox" class="alert d-none" role="alert"></div>

            <form id="loginForm" class="row g-3">
                <div class="col-12">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="col-12">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="col-12 d-grid">
                    <button type="submit" class="btn btn-success">Login</button>
                </div>
            </form>

            <p class="mt-4 mb-0">Need an account? <a href="./register.html">Register here</a>.</p>
        </section>
    </main>

    <script src="./assets/js/api.js"></script>
    <script>
        const loginForm = document.getElementById("loginForm");
        const alertBox = document.getElementById("alertBox");

        function showAlert(message, type) {
            alertBox.className = `alert alert-${type}`;
            alertBox.textContent = message;
        }

        loginForm.addEventListener("submit", async (event) => {
            event.preventDefault();

            const formData = new FormData(loginForm);
            const payload = Object.fromEntries(formData.entries());

            try {
                const result = await api("auth_login.php", "POST", payload);
                localStorage.setItem("ewaste_user", JSON.stringify(result.user));
                window.location.href = "./dashboard.html";
            } catch (error) {
                showAlert(error.message, "danger");
            }
        });
    </script>
</body>
</html>
