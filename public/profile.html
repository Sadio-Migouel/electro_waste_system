<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | E-Waste System</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./assets/css/app.css">
</head>
<body>
    <div id="app"></div>

    <script src="./assets/js/api.js"></script>
    <script src="./assets/js/layout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function loadProfilePage() {
            const user = await initLayout("profile", "Profile");

            if (!user) {
                return;
            }

            const pageOutlet = document.getElementById("pageOutlet");
            pageOutlet.innerHTML = `
                <section class="surface-card page-heading">
                    <div class="page-chip"><i class="bi bi-person-badge"></i> Account profile</div>
                    <h2 class="mt-3">Your account details</h2>
                    <p>View and manage your account information.</p>
                </section>

                <div class="row g-4">
                    <div class="col-lg-8">
                        <section class="surface-card h-100">
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <span class="profile-label">Full Name</span>
                                    <div class="profile-value">${escapeHtml(user.full_name)}</div>
                                </div>
                                <div class="col-md-6">
                                    <span class="profile-label">Email</span>
                                    <div class="profile-value">${escapeHtml(user.email)}</div>
                                </div>
                                <div class="col-md-6">
                                    <span class="profile-label">Phone</span>
                                    <div class="profile-value">${escapeHtml(user.phone || "-")}</div>
                                </div>
                                <div class="col-md-6">
                                    <span class="profile-label">Role</span>
                                    <div class="profile-value">${roleBadge(user.role)}</div>
                                </div>
                            </div>
                        </section>
                    </div>

                    <div class="col-lg-4">
                        <section class="surface-card h-100">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <div class="page-chip mb-0"><i class="bi bi-shield-check"></i> Security Tips</div>
                                <span class="badge text-bg-success">Session: Active</span>
                            </div>
                            <h3 class="h5">Stay protected</h3>
                            <ul class="text-secondary ps-3 mb-4">
                                <li>Keep your password private.</li>
                                <li>Log out on shared devices.</li>
                                <li>Verify pickup details before submitting.</li>
                            </ul>
                            <button type="button" class="btn btn-outline-secondary w-100" disabled>
                                <i class="bi bi-key me-2"></i>
                                Change Password (Coming Soon)
                            </button>
                        </section>
                    </div>
                </div>
            `;
        }

        
        loadProfilePage().catch((err) => {
            console.error(err);
            const outlet = document.getElementById("pageOutlet") || document.getElementById("app");
            if (outlet) {
                outlet.innerHTML = `<div class="alert alert-danger" role="alert">${escapeHtml(err.message || "Failed to load profile")}</div>`;
            }
        });
    </script>
</body>
</html>
