<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | E-Waste Management</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <main class="auth-shell">
        <section class="auth-card">
            <span class="eyebrow">Register</span>
            <h1>Create your account</h1>
            <p class="text-secondary mb-4">Start with a user account. Collector and admin roles can be managed later from the backend.</p>

            <div id="alertBox" class="alert d-none" role="alert"></div>

            <form id="registerForm" class="row g-3">
                <div class="col-12">
                    <label for="full_name" class="form-label">Full name</label>
                    <input type="text" class="form-control" id="full_name" name="full_name" required>
                </div>
                <div class="col-12">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="col-12">
                    <label for="phone" class="form-label">Phone</label>
                    <input type="text" class="form-control" id="phone" name="phone">
                </div>
                <div class="col-12">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" minlength="6" required>
                </div>
                <div class="col-12 d-grid">
                    <button type="submit" class="btn btn-success">Register</button>
                </div>
            </form>

            <p class="mt-4 mb-0">Already registered? <a href="./login.html">Login here</a>.</p>
        </section>
    </main>

    <script src="./assets/js/api.js"></script>
    <script>
        const registerForm = document.getElementById("registerForm");
        const alertBox = document.getElementById("alertBox");

        function showAlert(message, type) {
            alertBox.className = `alert alert-${type}`;
            alertBox.textContent = message;
        }

        registerForm.addEventListener("submit", async (event) => {
            event.preventDefault();

            const formData = new FormData(registerForm);
            const payload = Object.fromEntries(formData.entries());

            try {
                const result = await api("auth_register.php", "POST", payload);
                showAlert(result.message || "Registered", "success");
                registerForm.reset();
                window.setTimeout(() => {
                    window.location.href = "./login.html";
                }, 1200);
            } catch (error) {
                showAlert(error.message, "danger");
            }
        });
    </script>
</body>
</html>
