<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Pickup | E-Waste System</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./assets/css/app.css">
</head>
<body>
    <div id="app"></div>

    <script src="./assets/js/api.js"></script>
    <script src="./assets/js/layout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const MAX_MEDIA_SIZE = 20 * 1024 * 1024;

        function createItemRow(item = { name: "", qty: 1 }) {
            const row = document.createElement("div");
            row.className = "item-row";
            row.innerHTML = `
                <div class="row g-3 align-items-end">
                    <div class="col-md-7">
                        <label class="form-label">Item name</label>
                        <input type="text" class="form-control soft-input item-name" placeholder="Laptop, charger, battery..." value="${escapeHtml(item.name)}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Qty</label>
                        <input type="number" class="form-control soft-input item-qty" min="1" step="1" value="${escapeHtml(item.qty)}">
                    </div>
                    <div class="col-md-2 d-grid">
                        <button type="button" class="btn btn-outline-danger js-remove-item">Remove</button>
                    </div>
                </div>
            `;

            row.querySelector(".js-remove-item").addEventListener("click", () => {
                row.remove();

                if (document.querySelectorAll(".item-row").length === 0) {
                    document.getElementById("itemsContainer").appendChild(createItemRow());
                }
            });

            return row;
        }

        function collectItems() {
            return Array.from(document.querySelectorAll(".item-row")).map((row) => ({
                name: row.querySelector(".item-name").value.trim(),
                qty: Number.parseInt(row.querySelector(".item-qty").value, 10)
            }));
        }

        function renderMediaPreview(file) {
            const previewHost = document.getElementById("mediaPreview");

            if (!previewHost) {
                return;
            }

            if (!file) {
                previewHost.innerHTML = "";
                previewHost.classList.add("d-none");
                return;
            }

            previewHost.classList.remove("d-none");

            if (file.type.startsWith("image/")) {
                const previewUrl = URL.createObjectURL(file);
                previewHost.innerHTML = `
                    <div class="media-preview-shell mt-3">
                        <img src="${previewUrl}" alt="Selected e-waste preview" class="media-preview-image">
                        <div class="media-preview-meta">
                            <strong>${escapeHtml(file.name)}</strong>
                            <span>${escapeHtml((file.size / (1024 * 1024)).toFixed(2))} MB</span>
                        </div>
                    </div>
                `;

                const previewImage = previewHost.querySelector("img");
                previewImage.addEventListener("load", () => URL.revokeObjectURL(previewUrl), { once: true });
                return;
            }

            previewHost.innerHTML = `
                <div class="media-preview-shell mt-3">
                    <div class="media-preview-meta w-100">
                        <strong>${escapeHtml(file.name)}</strong>
                        <span>${escapeHtml(file.type || "Video file")} · ${escapeHtml((file.size / (1024 * 1024)).toFixed(2))} MB</span>
                    </div>
                </div>
            `;
        }

        async function loadRequestPage() {
            const user = await initLayout("request", "Request Pickup");

            if (!user) {
                return;
            }

            const pageOutlet = document.getElementById("pageOutlet");
            const canCreate = user.role === "user";

            pageOutlet.innerHTML = `
                <section class="surface-card page-heading">
                    <div class="d-flex flex-column flex-lg-row justify-content-between gap-4">
                        <div>
                            <div class="page-chip"><i class="bi bi-plus-square"></i> Pickup request</div>
                            <h2 class="mt-3">Schedule a new collection</h2>
                            <p>Enter your address, list the items you want collected, and upload a photo or video of the e-waste items before submitting.</p>
                        </div>
                        <div class="align-self-start align-self-lg-center">
                            <a href="./track.html" class="btn btn-outline-secondary">
                                <i class="bi bi-list-check me-2"></i>
                                View Request History
                            </a>
                        </div>
                    </div>
                </section>

                ${canCreate ? "" : `
                    <div class="alert alert-info mb-4" role="alert">
                        Pickup creation is available for resident user accounts. Your current role is ${escapeHtml(user.role)}.
                    </div>
                `}

                <section class="surface-card">
                    <div id="requestAlert" class="mb-3"></div>
                    <form id="requestForm">
                        <div class="mb-3">
                            <label for="address" class="form-label">Pickup address</label>
                            <textarea id="address" class="form-control soft-textarea" rows="4" placeholder="Street, building, access notes..." ${canCreate ? "" : "disabled"} required></textarea>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div>
                                <h3 class="h5 mb-1">Items</h3>
                                <p class="text-secondary mb-0">Add each e-waste item with its quantity.</p>
                            </div>
                            <button type="button" id="addItemButton" class="btn btn-outline-success" ${canCreate ? "" : "disabled"}>
                                <i class="bi bi-plus-lg me-2"></i>
                                Add Item
                            </button>
                        </div>

                        <div id="itemsContainer" class="d-grid gap-3 mb-4"></div>

                        <div class="mb-4">
                            <label for="media" class="form-label">Upload Photo/Video of E-Waste (required)</label>
                            <input type="file" id="media" name="media" class="form-control" accept="image/*,video/*" ${canCreate ? "" : "disabled"} required>
                            <div class="form-text upload-help-text">Allowed: JPG, PNG, WEBP, MP4, WEBM, MOV. Max size: 20MB.</div>
                            <div id="mediaPreview" class="d-none"></div>
                        </div>

                        <button type="submit" class="btn btn-success px-4" ${canCreate ? "" : "disabled"}>
                            <i class="bi bi-send-check me-2"></i>
                            Submit Request
                        </button>
                    </form>
                </section>
            `;

            const itemsContainer = document.getElementById("itemsContainer");
            const requestForm = document.getElementById("requestForm");
            const alertHost = document.getElementById("requestAlert");
            const addItemButton = document.getElementById("addItemButton");
            const mediaInput = document.getElementById("media");

            itemsContainer.appendChild(createItemRow());

            addItemButton.addEventListener("click", () => {
                itemsContainer.appendChild(createItemRow());
            });

            mediaInput.addEventListener("change", () => {
                const file = mediaInput.files && mediaInput.files[0] ? mediaInput.files[0] : null;
                renderMediaPreview(file);
            });

            requestForm.addEventListener("submit", async (event) => {
                event.preventDefault();

                if (!canCreate) {
                    return;
                }

                const submitButton = requestForm.querySelector('button[type="submit"]');
                const mediaFile = mediaInput.files && mediaInput.files[0] ? mediaInput.files[0] : null;

                if (!mediaFile) {
                    alertHost.innerHTML = '<div class="alert alert-danger mb-0" role="alert">Please upload a photo or video of the e-waste items.</div>';
                    return;
                }

                if (mediaFile.size > MAX_MEDIA_SIZE) {
                    alertHost.innerHTML = '<div class="alert alert-danger mb-0" role="alert">Selected file is too large. Maximum allowed size is 20MB.</div>';
                    return;
                }

                submitButton.disabled = true;
                submitButton.innerHTML = '<i class="bi bi-hourglass-split me-2"></i>Submitting...';
                alertHost.innerHTML = "";

                try {
                    const formData = new FormData();
                    formData.append("address", document.getElementById("address").value.trim());
                    formData.append("items", JSON.stringify(collectItems()));
                    formData.append("media", mediaFile);

                    const response = await fetch(`${API_BASE}/requests_create.php`, {
                        method: "POST",
                        body: formData,
                        credentials: "include"
                    });

                    const rawText = await response.text();
                    let data = {};

                    if (rawText) {
                        try {
                            data = JSON.parse(rawText);
                        } catch (parseError) {
                            throw new Error(rawText || "Invalid JSON response");
                        }
                    }

                    if (!response.ok) {
                        throw new Error(typeof data.error === "string" && data.error.trim() !== "" ? data.error : `Request failed with status ${response.status}`);
                    }

                    alertHost.innerHTML = `
                        <div class="alert alert-success mb-0" role="alert">
                            ${escapeHtml(data.message || "Request created successfully. Redirecting to tracking...")}
                        </div>
                    `;
                    requestForm.reset();
                    itemsContainer.innerHTML = "";
                    itemsContainer.appendChild(createItemRow());
                    renderMediaPreview(null);
                    window.setTimeout(() => {
                        window.location.href = "./track.html";
                    }, 700);
                } catch (err) {
                    console.error("Failed to create request", err);
                    alertHost.innerHTML = `
                        <div class="alert alert-danger mb-0" role="alert">
                            ${escapeHtml(`Failed to create request: ${err.message}`)}
                        </div>
                    `;
                } finally {
                    submitButton.disabled = !canCreate;
                    submitButton.innerHTML = '<i class="bi bi-send-check me-2"></i>Submit Request';
                }
            });
        }

        loadRequestPage().catch((err) => {
            console.error(err);
            const outlet = document.getElementById("pageOutlet") || document.getElementById("app");
            if (outlet) {
                outlet.innerHTML = `<div class="alert alert-danger" role="alert">${escapeHtml(err.message || "Failed to load request page")}</div>`;
            }
        });
    </script>
</body>
</html>
